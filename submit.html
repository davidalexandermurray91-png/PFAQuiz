<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Submit Score — MKCS Quiz Night</title>

<!-- WhatsApp / Social Preview -->
<meta property="og:title" content="MKCS Quiz Night — Submit Scores">
<meta property="og:description" content="Team captains: tap in your round scores here.">
<meta property="og:image" content="https://davidalexandermurray91-png.github.io/PFAQuiz/og-submit.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:type" content="website">
<meta property="og:url" content="https://davidalexandermurray91-png.github.io/PFAQuiz/submit.html">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --blue:#1a3fc7;
    --blue-deep:#122c91;
    --blue-dark:#0a0f2e;
    --yellow:#ffc627;
    --yellow-bright:#ffe04a;
    --white:#ffffff;
    --line:rgba(255,255,255,0.12);
    --soft:rgba(255,255,255,0.08);
  }
  html, body { background:var(--blue-dark); color:var(--white); font-family:'Barlow',sans-serif; min-height:100vh; }
  body { padding:14px 12px 80px; max-width:560px; margin:0 auto; }

  .top-accent { height:5px; background:var(--yellow); border-radius:3px; margin-bottom:14px; }

  header { text-align:center; margin-bottom:20px; }
  .eyebrow {
    font-family:'Barlow Condensed',sans-serif; font-weight:800;
    font-size:12px; letter-spacing:3px; text-transform:uppercase;
    color:rgba(255,255,255,0.55); margin-bottom:6px;
  }
  h1 {
    font-family:'Archivo Black',sans-serif;
    font-size:34px; line-height:0.95; text-transform:uppercase;
  }
  h1 span { color:var(--yellow); display:block; font-size:38px; }

  .panel {
    background:var(--blue);
    border-radius:16px;
    padding:20px 18px;
    margin-bottom:14px;
    box-shadow:0 6px 28px rgba(0,0,0,0.35);
  }
  .label {
    font-family:'Barlow Condensed',sans-serif; font-weight:800;
    font-size:13px; letter-spacing:3px; text-transform:uppercase;
    color:var(--yellow); margin-bottom:10px;
  }

  /* Team picker */
  .team-current {
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:rgba(0,0,0,0.22); border:2px solid rgba(255,198,39,0.35);
    border-radius:14px; padding:16px 18px; cursor:pointer; min-height:64px;
  }
  .team-current:active { transform:scale(0.99); }
  .team-name {
    font-family:'Archivo Black',sans-serif; font-size:22px;
    line-height:1.15; flex:1; word-break:break-word;
  }
  .team-name.placeholder { color:rgba(255,255,255,0.5); font-family:'Barlow',sans-serif; font-weight:700; font-size:17px; letter-spacing:1px; text-transform:uppercase; }
  .team-chev { font-size:22px; color:var(--yellow); }

  .team-list { display:none; margin-top:10px; }
  .team-list.open { display:block; }
  .team-search {
    width:100%; background:rgba(0,0,0,0.25); border:1px solid var(--line);
    color:var(--white); font-family:'Barlow',sans-serif; font-weight:600;
    font-size:17px; padding:14px 16px; border-radius:12px; outline:none;
    margin-bottom:10px;
  }
  .team-search:focus { border-color:var(--yellow); }
  .team-search::placeholder { color:rgba(255,255,255,0.4); }

  .team-options {
    max-height:280px; overflow-y:auto;
    background:rgba(0,0,0,0.18); border-radius:12px;
    -webkit-overflow-scrolling:touch;
  }
  .team-option {
    display:flex; align-items:center; gap:12px;
    padding:14px 16px; border-bottom:1px solid var(--line);
    font-size:17px; font-weight:700; cursor:pointer;
    min-height:54px;
  }
  .team-option:last-child { border-bottom:none; }
  .team-option:active { background:rgba(255,198,39,0.12); }
  .team-option .check { color:var(--yellow); font-weight:800; opacity:0; width:18px; }
  .team-option.selected .check { opacity:1; }
  .team-option.selected { background:rgba(255,198,39,0.08); }

  .team-add {
    display:flex; align-items:center; gap:10px;
    background:rgba(255,198,39,0.12); border:1px dashed rgba(255,198,39,0.5);
    color:var(--yellow); font-family:'Archivo Black',sans-serif; font-size:15px;
    letter-spacing:1px; text-transform:uppercase;
    padding:14px 16px; border-radius:12px; margin-top:10px;
    cursor:pointer; text-align:center; justify-content:center;
    min-height:54px;
  }
  .team-add:active { background:rgba(255,198,39,0.22); }
  .team-empty { padding:18px; text-align:center; color:rgba(255,255,255,0.45); font-style:italic; }

  /* Round + score */
  .round-grid {
    display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
  }
  .round-btn {
    background:rgba(0,0,0,0.22); border:2px solid var(--line);
    color:var(--white); font-family:'Archivo Black',sans-serif;
    font-size:20px; padding:18px 0; border-radius:12px; cursor:pointer;
    text-align:center; line-height:1; min-height:60px;
    transition:background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .round-btn:active { transform:scale(0.96); }
  .round-btn.active {
    background:var(--yellow); color:var(--blue-deep); border-color:var(--yellow);
  }

  .score-input {
    width:100%; background:rgba(0,0,0,0.25); border:2px solid rgba(255,198,39,0.35);
    color:var(--white); font-family:'Archivo Black',sans-serif;
    font-size:38px; text-align:center; padding:14px 6px; border-radius:14px;
    outline:none; min-width:0;
    -webkit-appearance:none; -moz-appearance:textfield;
  }
  .score-input:focus { border-color:var(--yellow); }
  .score-input::-webkit-outer-spin-button,
  .score-input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }

  .submit-btn {
    display:block; width:100%;
    background:var(--yellow); color:var(--blue-deep);
    font-family:'Archivo Black',sans-serif; font-size:22px;
    letter-spacing:2px; text-transform:uppercase;
    padding:18px; border-radius:60px; border:none; cursor:pointer;
    box-shadow:0 4px 20px rgba(255,198,39,0.35);
    margin-top:6px; min-height:62px;
  }
  .submit-btn:active { transform:scale(0.99); background:var(--yellow-bright); }
  .submit-btn:disabled { opacity:0.45; cursor:not-allowed; box-shadow:none; }

  .link-row {
    text-align:center; margin-top:18px; font-size:14px;
    color:rgba(255,255,255,0.55);
  }
  .link-row a { color:var(--yellow); font-weight:700; text-decoration:none; }
  .link-row a:active { text-decoration:underline; }

  #toast {
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%) translateY(60px);
    background:var(--blue-deep); border:2px solid var(--yellow);
    color:var(--white); padding:14px 22px; border-radius:30px;
    font-family:'Archivo Black',sans-serif; font-size:14px; letter-spacing:1px;
    text-transform:uppercase;
    box-shadow:0 6px 24px rgba(0,0,0,0.5);
    opacity:0; transition:all 0.25s; pointer-events:none; z-index:999;
    max-width:90vw; text-align:center;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  #toast.error { border-color:#ff6b6b; }

  #setup {
    background:rgba(255,107,107,0.1); border:1px solid rgba(255,107,107,0.45);
    color:#ffd0d0; padding:14px 16px; border-radius:12px; margin-bottom:14px;
    font-size:13px; line-height:1.5;
  }
  #setup code { background:rgba(0,0,0,0.4); padding:2px 6px; border-radius:4px; font-size:12px; }

  @media (max-width:380px) {
    h1 { font-size:30px; } h1 span { font-size:34px; }
    .team-name { font-size:19px; }
    .round-btn { font-size:18px; padding:16px 0; }
    .score-input { font-size:32px; }
  }
</style>
</head>
<body>
<div class="top-accent"></div>

<header>
  <div class="eyebrow">MKCS Quiz Night · Score Entry</div>
  <h1>Submit<span>Round Score</span></h1>
</header>

<div id="setup" style="display:none">
  <strong>Setup needed:</strong> Paste your Apps Script Web app URL into <code>API_URL</code> at the top of this file. See <code>apps-script.gs</code> for instructions.
</div>

<div class="panel">
  <div class="label">Your Team</div>
  <div class="team-current" id="team-current" onclick="toggleTeamList()">
    <div class="team-name placeholder" id="team-name">Tap to select team</div>
    <div class="team-chev" id="team-chev">▾</div>
  </div>
  <div class="team-list" id="team-list">
    <input type="text" class="team-search" id="team-search" placeholder="Search teams…" autocomplete="off">
    <div class="team-options" id="team-options"></div>
    <div class="team-add" onclick="promptAddTeam()">+ Add new team</div>
  </div>
</div>

<div class="panel">
  <div class="label">Round</div>
  <div class="round-grid" id="round-grid"></div>
</div>

<div class="panel">
  <div class="label">Score</div>
  <input class="score-input" id="score-input" type="number" inputmode="decimal" pattern="[0-9]*" step="0.5" placeholder="0">
</div>

<button class="submit-btn" id="submit-btn" onclick="submitScore()">Submit Score →</button>

<div class="link-row">
  View live scoreboard — <a href="index.html">Open Scoreboard</a><br>
  <a href="manage.html" style="font-size:12px; opacity:0.7;">Fix a mistake?</a>
</div>

<div id="toast"></div>

<script>
  // ============================================================
  // CONFIG — paste your Apps Script Web app URL here.
  // ============================================================
  const API_URL = 'https://script.google.com/macros/s/AKfycby4CsJlEWM_De3XJKhPaYDUtb1-FxReaW3dqU55cdSDcnUnbn3xik1UEbpbT6x2B1AvDA/exec';
  const ROUNDS  = 7;
  // ============================================================

  let teams = [];
  let selectedTeam = null;
  let selectedRound = null;

  if (!API_URL || API_URL.indexOf('script.google.com') === -1) {
    document.getElementById('setup').style.display = 'block';
  }

  // Build round buttons
  (function buildRounds() {
    const grid = document.getElementById('round-grid');
    for (let i = 1; i <= ROUNDS; i++) {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'round-btn';
      b.textContent = 'R' + i;
      b.dataset.round = i;
      b.onclick = () => selectRound(i);
      grid.appendChild(b);
    }
  })();

  function selectRound(r) {
    selectedRound = r;
    document.querySelectorAll('.round-btn').forEach(el => {
      el.classList.toggle('active', Number(el.dataset.round) === r);
    });
  }

  function toggleTeamList() {
    const list = document.getElementById('team-list');
    const open = list.classList.toggle('open');
    document.getElementById('team-chev').textContent = open ? '▴' : '▾';
    if (open) {
      document.getElementById('team-search').value = '';
      renderTeamOptions('');
      setTimeout(() => document.getElementById('team-search').focus(), 50);
    }
  }

  function renderTeamOptions(filter) {
    const box = document.getElementById('team-options');
    const f = (filter || '').toLowerCase();
    const match = teams.filter(t => t.toLowerCase().includes(f));
    if (!match.length) {
      box.innerHTML = '<div class="team-empty">' + (teams.length ? 'No matches' : 'No teams yet — add one below') + '</div>';
      return;
    }
    box.innerHTML = match.map(t => {
      const sel = (selectedTeam && t.toLowerCase() === selectedTeam.toLowerCase()) ? ' selected' : '';
      return '<div class="team-option' + sel + '" data-team="' + escapeAttr(t) + '"><span class="check">✓</span><span>' + escapeHtml(t) + '</span></div>';
    }).join('');
    box.querySelectorAll('.team-option').forEach(el => {
      el.onclick = () => pickTeam(el.dataset.team);
    });
  }

  const TEAM_KEY = 'mkcs_quiz_team';

  function pickTeam(name) {
    selectedTeam = name;
    try { localStorage.setItem(TEAM_KEY, name); } catch (e) {}
    const nameEl = document.getElementById('team-name');
    nameEl.textContent = name;
    nameEl.classList.remove('placeholder');
    document.getElementById('team-list').classList.remove('open');
    document.getElementById('team-chev').textContent = '▾';
  }

  async function promptAddTeam() {
    const raw = window.prompt('New team name:');
    if (!raw) return;
    const name = raw.trim();
    if (!name) return;
    if (teams.some(t => t.toLowerCase() === name.toLowerCase())) {
      pickTeam(teams.find(t => t.toLowerCase() === name.toLowerCase()));
      toast('Team already exists — selected.');
      return;
    }
    toast('Adding team…');
    try {
      const res = await api({ action: 'addTeam', name });
      if (!res.ok) throw new Error(res.error || 'Failed');
      teams = res.teams || teams.concat(name);
      pickTeam(name);
      toast('Team added.');
    } catch (e) {
      toast('Could not add team: ' + e.message, true);
    }
  }

  async function submitScore() {
    if (!selectedTeam) { toast('Pick a team first.', true); return; }
    if (!selectedRound) { toast('Pick a round.', true); return; }
    const raw = document.getElementById('score-input').value;
    if (raw === '' || isNaN(Number(raw))) { toast('Enter a score.', true); return; }
    const score = Number(raw);
    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Submitting…';
    try {
      const res = await api({ action: 'submitScore', team: selectedTeam, round: selectedRound, score });
      if (!res.ok) throw new Error(res.error || 'Failed');
      toast((res.updated ? 'Updated' : 'Saved') + ': ' + selectedTeam + ' R' + selectedRound + ' = ' + score);
      // Reset score + round but keep team for fast successive entry
      selectedRound = null;
      document.querySelectorAll('.round-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('score-input').value = '';
    } catch (e) {
      toast('Submit failed: ' + e.message, true);
    } finally {
      btn.disabled = false; btn.textContent = 'Submit Score →';
    }
  }

  async function loadTeams() {
    try {
      const res = await fetch(API_URL);
      const data = await res.json();
      if (data && data.teams) {
        teams = data.teams;
        restoreTeam();
        renderTeamOptions('');
      }
    } catch (e) {
      // Silent — user can still add teams
      console.warn('loadTeams failed', e);
    }
  }

  function restoreTeam() {
    if (selectedTeam) return;
    let saved;
    try { saved = localStorage.getItem(TEAM_KEY); } catch (e) {}
    if (!saved) return;
    const match = teams.find(t => t.toLowerCase() === saved.toLowerCase());
    if (match) pickTeam(match);
  }

  async function api(payload) {
    // text/plain avoids a CORS preflight against Apps Script
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload),
    });
    return res.json();
  }

  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function escapeAttr(s) { return escapeHtml(s); }

  let toastTimer;
  function toast(msg, isError) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show' + (isError ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  document.getElementById('team-search').addEventListener('input', e => renderTeamOptions(e.target.value));

  // Close the team list when tapping outside it
  document.addEventListener('click', e => {
    const list = document.getElementById('team-list');
    const cur  = document.getElementById('team-current');
    if (!list.classList.contains('open')) return;
    if (list.contains(e.target) || cur.contains(e.target)) return;
    list.classList.remove('open');
    document.getElementById('team-chev').textContent = '▾';
  });

  loadTeams();
</script>
</body>
</html>
