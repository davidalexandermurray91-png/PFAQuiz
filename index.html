<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Scoreboard — MKCS Quiz Night</title>

<!-- WhatsApp / Social Preview -->
<meta property="og:title" content="MKCS Quiz Night — Live Scoreboard">
<meta property="og:description" content="Tap for live standings — round-by-round scores updated in real time.">
<meta property="og:image" content="https://davidalexandermurray91-png.github.io/PFAQuiz/og-scoreboard.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:type" content="website">
<meta property="og:url" content="https://davidalexandermurray91-png.github.io/PFAQuiz/">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --blue:#1a3fc7;
    --blue-deep:#122c91;
    --blue-dark:#0a0f2e;
    --yellow:#ffc627;
    --yellow-bright:#ffe04a;
    --white:#ffffff;
    --green:#3fbf7f;
    --red:#ff6b6b;
    --line:rgba(255,255,255,0.10);
    --soft:rgba(255,255,255,0.06);
    /* Fixed column widths — rounds take exactly this; team column gets everything left */
    --col-pos:36px;
    --col-round:44px;
    --col-total:72px;
  }
  html, body { background:var(--blue-dark); color:var(--white); font-family:'Barlow',sans-serif; min-height:100vh; }
  body { padding:14px 10px 60px; max-width:980px; margin:0 auto; }

  .top-accent { height:5px; background:var(--yellow); border-radius:3px; margin-bottom:14px; }

  header {
    display:flex; align-items:flex-end; justify-content:space-between; gap:14px;
    flex-wrap:wrap; margin-bottom:18px;
  }
  .title-block { flex:1; min-width:0; }
  .eyebrow {
    font-family:'Barlow Condensed',sans-serif; font-weight:800;
    font-size:12px; letter-spacing:3px; text-transform:uppercase;
    color:rgba(255,255,255,0.55); margin-bottom:4px;
  }
  h1 { font-family:'Archivo Black',sans-serif; font-size:38px; line-height:0.95; text-transform:uppercase; }
  h1 span { color:var(--yellow); }

  .status {
    font-family:'Barlow Condensed',sans-serif; font-weight:700;
    font-size:12px; letter-spacing:2px; text-transform:uppercase;
    color:rgba(255,255,255,0.55);
    display:flex; align-items:center; gap:8px;
  }
  .status .dot { width:8px; height:8px; border-radius:50%; background:var(--yellow); box-shadow:0 0 8px var(--yellow); }
  .status.stale .dot { background:var(--red); box-shadow:0 0 8px var(--red); }

  .board { background:var(--blue); border-radius:16px; overflow:hidden; box-shadow:0 6px 28px rgba(0,0,0,0.35); }

  /* Grid: pos | team (1fr — gets all remaining space) | round cols (fixed) | total (fixed) */
  .row-head, .row {
    display:grid;
    grid-template-columns: var(--col-pos) 1fr repeat(var(--rounds,0), var(--col-round)) var(--col-total);
    align-items:center;
  }
  .row-head {
    background:rgba(0,0,0,0.28);
    font-family:'Barlow Condensed',sans-serif; font-weight:800;
    font-size:13px; letter-spacing:2px; text-transform:uppercase;
    color:var(--yellow); padding:12px 8px;
  }
  .row-head .h-pos  { text-align:center; }
  .row-head .h-team { padding-left:6px; }
  .row-head .h-round{ text-align:center; }
  .row-head .h-total{ text-align:right; padding-right:12px; }

  .row { padding:10px 8px; border-top:1px solid var(--line); transition:background 0.2s; }
  .row:first-of-type { border-top:none; }
  .row.leader { background:rgba(255,198,39,0.10); }
  .row.leader .pos-badge { color:var(--blue-deep); background:var(--yellow); }
  .row.leader .team      { color:var(--yellow); }
  .row.leader .total     { color:var(--yellow); }

  /* Position column: rank badge with movement arrow stacked beneath (no extra width) */
  .pos { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .pos-badge {
    font-family:'Archivo Black',sans-serif;
    width:28px; height:28px; border-radius:50%;
    background:rgba(255,255,255,0.08); color:var(--white);
    display:flex; align-items:center; justify-content:center;
    font-size:13px; flex-shrink:0;
  }
  .move { font-size:11px; line-height:1; height:11px; }
  .move.up   { color:var(--green); }
  .move.down { color:var(--red); }

  /* Team name: wraps freely so the full name is always visible; row grows as needed */
  .team {
    font-family:'Archivo Black',sans-serif;
    font-size:17px; padding-left:6px;
    word-break:break-word;
    line-height:1.2;
    min-width:0;
  }

  /* Round cells */
  .round-cell {
    text-align:center;
    font-family:'Barlow',sans-serif; font-weight:700;
    font-size:15px; color:rgba(255,255,255,0.85);
    display:flex; align-items:center; justify-content:center;
  }
  .round-cell.empty { color:rgba(255,255,255,0.18); }

  /* High score per round — yellow circle badge */
  .round-cell.high .score-val {
    display:inline-flex; align-items:center; justify-content:center;
    background:var(--yellow); color:var(--blue-deep);
    font-family:'Archivo Black',sans-serif;
    font-size:13px;
    min-width:30px; height:30px;
    border-radius:999px; padding:0 4px;
  }

  .total {
    text-align:right; padding-right:12px;
    font-family:'Archivo Black',sans-serif;
    font-size:20px; color:var(--white);
  }

  .empty-state {
    padding:50px 24px; text-align:center;
    color:rgba(255,255,255,0.45); font-style:italic; font-size:16px;
  }
  .empty-state strong {
    display:block; color:var(--yellow); font-style:normal;
    font-family:'Archivo Black',sans-serif; font-size:18px;
    margin-bottom:8px; letter-spacing:1px; text-transform:uppercase;
  }

  .link-row { text-align:center; margin-top:18px; font-size:14px; color:rgba(255,255,255,0.55); }
  .link-row a { color:var(--yellow); font-weight:700; text-decoration:none; }

  #setup {
    background:rgba(255,107,107,0.1); border:1px solid rgba(255,107,107,0.45);
    color:#ffd0d0; padding:14px 16px; border-radius:12px; margin-bottom:14px;
    font-size:13px; line-height:1.5;
  }
  #setup code { background:rgba(0,0,0,0.4); padding:2px 6px; border-radius:4px; font-size:12px; }

  @media (max-width:600px) {
    :root { --col-pos:28px; --col-round:34px; --col-total:56px; }
    h1 { font-size:30px; }
    .row-head { font-size:11px; padding:10px 4px; }
    .row { padding:9px 4px; }
    .pos-badge { width:24px; height:24px; font-size:11px; }
    .move { font-size:10px; height:10px; }
    .team { font-size:14px; padding-left:4px; }
    .round-cell { font-size:13px; }
    .round-cell.high .score-val { min-width:26px; height:26px; font-size:11px; }
    .total { font-size:17px; padding-right:6px; }
    .h-total { padding-right:6px; }
  }
  @media (max-width:380px) {
    :root { --col-pos:24px; --col-round:28px; --col-total:48px; }
    h1 { font-size:26px; }
    .team { font-size:13px; }
    .round-cell { font-size:11px; }
    .round-cell.high .score-val { min-width:22px; height:22px; font-size:10px; }
    .total { font-size:15px; }
  }
</style>
</head>
<body>
<div class="top-accent"></div>

<header>
  <div class="title-block">
    <div class="eyebrow">MKCS Quiz Night · Live</div>
    <h1>Score<span>board</span></h1>
  </div>
  <div class="status" id="status">
    <div class="dot"></div>
    <span id="status-text">Loading…</span>
  </div>
</header>

<div id="setup" style="display:none">
  <strong>Setup needed:</strong> Paste your Apps Script Web app URL into <code>API_URL</code> at the top of this file.
</div>

<div class="board" id="board">
  <div class="empty-state"><strong>No scores yet</strong>Submit the first round to bring the board to life.</div>
</div>

<div class="link-row">Enter scores — <a href="submit.html">Open Score Entry</a></div>

<script>
  const API_URL  = 'https://script.google.com/macros/s/AKfycby4CsJlEWM_De3XJKhPaYDUtb1-FxReaW3dqU55cdSDcnUnbn3xik1UEbpbT6x2B1AvDA/exec';
  const REFRESH_MS = 8000;

  if (!API_URL || API_URL.indexOf('script.google.com') === -1) {
    document.getElementById('setup').style.display = 'block';
  }

  let lastDataKey = '';
  let prevRanks = null;      // rankings from the previous render
  let snapshotRanks = null;  // rankings frozen at the end of the previous round
  let prevMaxRound = 0;      // highest round number seen so far

  async function tick() {
    try {
      const res = await fetch(API_URL + '?_=' + Date.now());
      const data = await res.json();
      if (!data || !data.ok) throw new Error(data && data.error || 'Bad response');
      render(data);
      setStatus(false, 'Updated ' + new Date().toLocaleTimeString());
    } catch (e) {
      console.warn('tick failed', e);
      setStatus(true, 'Connection lost · retrying');
    }
  }

  function setStatus(stale, msg) {
    document.getElementById('status').classList.toggle('stale', !!stale);
    document.getElementById('status-text').textContent = msg;
  }

  function render(data) {
    const scores     = data.scores  || [];
    const teamsKnown = data.teams   || [];

    // Rounds that have at least one score submitted
    const roundSet = new Set();
    scores.forEach(s => roundSet.add(s.round));
    const roundsUsed = Array.from(roundSet).sort((a, b) => a - b);

    // Aggregate per team
    const teamMap = {};
    function ensureTeam(name) {
      const k = name.toLowerCase();
      if (!teamMap[k]) teamMap[k] = { key: k, display: name, perRound: {}, total: 0 };
      return teamMap[k];
    }
    scores.forEach(s => {
      const t = ensureTeam(s.team);
      t.perRound[s.round] = s.score;
      t.total = Object.values(t.perRound).reduce((a, b) => a + b, 0);
    });
    if (scores.length) {
      teamsKnown.forEach(n => { if (!teamMap[n.toLowerCase()]) ensureTeam(n); });
    }

    const rows = Object.values(teamMap).sort((a, b) => {
      if (b.total !== a.total) return b.total - a.total;
      return a.display.localeCompare(b.display);
    });

    const key = JSON.stringify({ rows, roundsUsed });
    if (key === lastDataKey) return;
    lastDataKey = key;

    const board = document.getElementById('board');

    if (!rows.length || !roundsUsed.length) {
      board.innerHTML = '<div class="empty-state"><strong>No scores yet</strong>Submit the first round to bring the board to life.</div>';
      board.style.removeProperty('--rounds');
      prevRanks = null;
      return;
    }

    board.style.setProperty('--rounds', roundsUsed.length);

    // Current rank map
    const currRanks = {};
    rows.forEach((t, i) => { currRanks[t.key] = i; });

    // Snapshot rankings at the moment a new round's first score arrives,
    // so arrows compare against end-of-previous-round standings (not mid-round state)
    const maxRound = roundsUsed.length > 0 ? Math.max(...roundsUsed) : 0;
    if (maxRound > prevMaxRound) {
      snapshotRanks = prevRanks;
      prevMaxRound = maxRound;
    }

    // Movement arrows: only from round 2 onward, and only when we have a snapshot to compare against
    const showMovement = roundsUsed.length >= 2 && snapshotRanks && Object.keys(snapshotRanks).length > 0;

    // High score per round (to badge)
    const roundHigh = {};
    roundsUsed.forEach(r => {
      let max = -Infinity;
      rows.forEach(t => { const v = t.perRound[r]; if (v !== undefined && v > max) max = v; });
      if (max > -Infinity) roundHigh[r] = max;
    });

    const topTotal = rows[0].total;

    let html = '<div class="row-head">';
    html += '<div class="h-pos">#</div>';
    html += '<div class="h-team">Team</div>';
    roundsUsed.forEach(r => { html += '<div class="h-round">R' + r + '</div>'; });
    html += '<div class="h-total">Total</div></div>';

    rows.forEach((t, i) => {
      const isLeader = t.total === topTotal && topTotal > 0;

      // Movement arrow
      let moveHtml = '<div class="move"></div>';
      if (showMovement && snapshotRanks[t.key] !== undefined) {
        const delta = snapshotRanks[t.key] - i; // positive = climbed (rank index decreased)
        if (delta > 0)      moveHtml = '<div class="move up">▲</div>';
        else if (delta < 0) moveHtml = '<div class="move down">▼</div>';
      }

      html += '<div class="row' + (isLeader ? ' leader' : '') + '">';
      html += '<div class="pos"><div class="pos-badge">' + (i + 1) + '</div>' + moveHtml + '</div>';
      html += '<div class="team">' + escapeHtml(t.display) + '</div>';
      roundsUsed.forEach(r => {
        const v = t.perRound[r];
        if (v === undefined || v === null) {
          html += '<div class="round-cell empty">—</div>';
        } else if (v === roundHigh[r] && roundHigh[r] !== undefined) {
          html += '<div class="round-cell high"><span class="score-val">' + fmt(v) + '</span></div>';
        } else {
          html += '<div class="round-cell">' + fmt(v) + '</div>';
        }
      });
      html += '<div class="total">' + fmt(t.total) + '</div>';
      html += '</div>';
    });

    board.innerHTML = html;

    // Store this standings as the baseline for the next change
    prevRanks = currRanks;
  }

  function fmt(n) {
    if (n === undefined || n === null) return '';
    return Number.isInteger(n) ? String(n) : String(Math.round(n * 10) / 10);
  }
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  tick();
  setInterval(tick, REFRESH_MS);
</script>
</body>
</html>
